<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مينا ميلاد</title>

    <style>
        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background-color: #f5f5f5;
            direction: rtl;
        }

        /* Navbar */
        .navbar {
            background-color: #0b5d3b;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    margin-left: 15px;
    transition: 0.3s;
}

nav a:hover {
    color: #f4c542;
}
        .logo {
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 60px;
            margin-left: 10px;
        }

        .logo span {
            color: #f4c542;
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links li {
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }

        .nav-links li:hover {
            color: #f4c542;
        }

        /* Main Section */
        .main {
            text-align: center;
            padding: 40px;
        }

        .main img {
            width: 250px;
        }

        .main h1 {
            color: #0b5d3b;
            margin-top: 20px;
        }

        /* Cards Section */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card h3 {
            color: #0b5d3b;
        }

    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">
            <img src="logo.jpeg" alt="logo">
            <span>مينا ميلاد</span>
        </div>

        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="inventory.html">المخزن</a>
            <a href="cart.html">العربة</a>
            <a href="invoice.html">الفواتير</a>
            <a href="customers.html">الزباين</a>
          </nav>
    </div>

    <!-- Main -->
    <div class="main">
        <img src="logo.jpeg" alt="logo">
        <h1>نظام إدارة توزيع المنتجات الغذائية</h1>
    </div>

    <!-- Sections -->
    <div class="cards">
        <div class="card">
            <h3>المخزن</h3>
            <p>إدارة المنتجات والكميات</p>
        </div>

        <div class="card">
            <h3>العربية</h3>
            <p>متابعة الطلبات الحالية</p>
        </div>

        <div class="card">
            <h3>الفواتير</h3>
            <p>عرض وإنشاء الفواتير</p>
        </div>

        <div class="card">
            <h3>العملاء</h3>
            <p>إدارة بيانات العملاء</p>
        </div>
    </div>

</body>
</html>
