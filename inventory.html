<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إدارة المخزن</title>

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background-color: #f5f5f5;
    direction: rtl;
}

.navbar {
    background-color: #0b5d3b;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    margin-left: 15px;
}

nav a:hover { color: #f4c542; }

.logo {
    display: flex;
    align-items: center;
}

.logo img {
    height: 60px;
    margin-left: 10px;
}

.logo span {
    color: #f4c542;
    font-size: 22px;
    font-weight: bold;
}
.container {display:flex; gap:100px; padding:10px;}
.section {background:#fff; padding:20px; border-radius:10px;}
.products {flex: 2;}
.cart {flex: 1;}
.section {background:#fff; padding:20px; border-radius:10px; width:60%;}
input, button {margin:5px; padding:8px;}
.table {width:100%; border-collapse: collapse;}
.table th, .table td {border:1px solid #ccc; padding:8px; text-align:center;}
</style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">
            <img src="logo.jpeg" alt="logo">
            <span>مينا ميلاد</span>
        </div>

        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="inventory.html">المخزن</a>
            <a href="cart.html">العربة</a>
            <a href="invoice.html">الفواتير</a>
            <a href="customers.html">الزباين</a>
          </nav>
    </div>

<h2 style="text-align:center">إدارة المخزن</h2>

<div class="container">

<div class="section">
<h3>إضافة منتج</h3>
<input id="code" placeholder="كود المنتج">
<input id="name" placeholder="اسم المنتج">
<input id="price" type="number" placeholder="السعر">
<input id="qty" type="number" placeholder="الكمية">
<input id="prodDate" type="date">
<input id="expDate" type="date">
<button onclick="addProduct()">إضافة</button>

<table class="table" id="productsTable">
<thead>
<tr>
<th>كود</th>
<th>اسم</th>
<th>سعر</th>
<th>كمية</th>
<th>إنتاج</th>
<th>انتهاء</th>
<th>متبقي (يوم)</th>
<th>إجمالي</th>
<th>تحكم</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="section">
<h3>العربة</h3>
<table class="table" id="cartTable">
<thead>
<tr>
<th>كود</th><th>اسم</th><th>سعر</th><th>كمية</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAkIp0t7NVAkS6m9v39734r6-XHQUHtVgM",
  authDomain: "minamiladdistrubute.firebaseapp.com",
  projectId: "minamiladdistrubute",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const productsCol = collection(db, "products");
const cartCol = collection(db, "cart");

window.onload = () => {
    loadProducts();
    loadCart();
};

// ================= HELP =================
function calcDays(expDate){
    let today = new Date();
    let exp = new Date(expDate);
    let diff = exp - today;
    return Math.ceil(diff / (1000*60*60*24));
}

// ================= PRODUCTS =================

async function addProduct(){
    let product = {
        code: codeEl.value,
        name: nameEl.value,
        price: +priceEl.value,
        qty: +qtyEl.value,
        prodDate: prodDateEl.value,
        expDate: expDateEl.value
    };

    await addDoc(productsCol, product);

    loadProducts();
}

async function loadProducts(){
    let snapshot = await getDocs(productsCol);
    let table = document.querySelector('#productsTable tbody');
    table.innerHTML = '';

    snapshot.forEach(docSnap=>{
        let p = docSnap.data();
        let id = docSnap.id;

        let days = calcDays(p.expDate);

        let row = `
        <tr>
        <td>${p.code}</td>
        <td>${p.name}</td>
        <td>${p.price}</td>
        <td>${p.qty}</td>
        <td>${p.prodDate}</td>
        <td>${p.expDate}</td>
        <td style="color:${days<0?'red':'green'}">${days}</td>
        <td>${p.price*p.qty}</td>
        <td>
        <input type="number" id="take${id}">
        <button onclick="addToCart('${id}',${p.price},'${p.name}',${p.qty})">نقل</button>
        <button onclick="deleteProduct('${id}')">حذف</button>
        </td>
        </tr>
        `;
        table.innerHTML += row;
    });
}

async function deleteProduct(id){
    await deleteDoc(doc(db,"products",id));
    loadProducts();
}

// ================= CART =================

async function addToCart(id){

let take = +document.getElementById('take'+id).value;

if(!take || take <= 0){
    alert("ادخلي كمية صحيحة");
    return;
}

try {
    // نجيب المنتج
    let productDoc = doc(db,"products",id);
    let snapshot = await getDocs(productsCol);

    let product = null;

    snapshot.forEach(docSnap=>{
        if(docSnap.id === id){
            product = docSnap.data();
        }
    });

    if(!product){
        alert("المنتج غير موجود");
        return;
    }

    if(take > product.qty){
        alert("الكمية غير كافية");
        return;
    }

    // ✅ إضافة بالكولكشن cart بالبيانات المطلوبة فقط
    await addDoc(cartCol, {
        code: product.code,
        name: product.name,
        price: product.price,
        qty: take
    });

    // خصم الكمية
    await updateDoc(doc(db,"products",id), {
        qty: product.qty - take
    });

    loadProducts();
    loadCart();

} catch(error){
    console.error(error);
    alert("حصل خطأ");
}
}

async function loadCart(){
    let snapshot = await getDocs(cartCol);
    let table = document.querySelector('#cartTable tbody');
    table.innerHTML='';

    snapshot.forEach(docSnap=>{
        let c = docSnap.data();

        table.innerHTML += `
<tr>
<td>${c.code}</td>
<td>${c.name}</td>
<td>${c.price}</td>
<td>${c.qty}</td>
</tr>`;
    });
}

// ================= WINDOW =================

window.addProduct = addProduct;
window.deleteProduct = deleteProduct;
window.addToCart = addToCart;

// ================= SHORTCUTS =================

const codeEl = document.getElementById('code');
const nameEl = document.getElementById('name');
const priceEl = document.getElementById('price');
const qtyEl = document.getElementById('qty');
const prodDateEl = document.getElementById('prodDate');
const expDateEl = document.getElementById('expDate');

</script>

</body>
</html>
